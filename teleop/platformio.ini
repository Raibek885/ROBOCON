; PlatformIO Project Configuration File
;
; Abu Robocon — Unified Teleop Controller
; Single ESP32 controlling:
;   • 4× drive motors (tank-drive, PWM+DIR)
;   • 2× BTS7960 motors (arm / mechanism)
;   • PCA9685 16-channel servo driver (grippers)
;   • PS4 DualShock gamepad via Bluepad32

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Bluepad32 replaces the Arduino-ESP32 core (can't be a normal lib_dep)
platform_packages =
    framework-arduinoespressif32@https://github.com/maxgerhardt/pio-framework-bluepad32/archive/refs/heads/main.zip

lib_deps =
    adafruit/Adafruit PWM Servo Driver Library@^3.0.2
    adafruit/Adafruit BusIO@^1.16.2
