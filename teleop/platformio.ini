; PlatformIO Project Configuration File
;
; Abu Robocon — Unified Teleop Controller
; Single ESP32 controlling:
;   • 4× Cytron drive motors (tank-drive, PWM+DIR)
;   • 2× BTS7960 motors (arm / mechanism)
;   • PS4 DualShock gamepad via Bluepad32

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Bluepad32 replaces the Arduino-ESP32 core
; Using a short local symlink (fw-bp32) to avoid Windows CreateProcess
; command-line length limit (~32768 chars) that causes build failures.
; The junction was created:  .platformio\packages\fw-bp32 → framework-arduinoespressif32@src-...
platform_packages =
    framework-arduinoespressif32@symlink://C:\Users\raibe\.platformio\packages\fw-bp32
